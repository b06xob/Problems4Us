name: Build and Deploy to Azure App Service

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AZURE_WEBAPP_NAME: problems4us
  AZURE_RESOURCE_GROUP: rg-problems4us
  NODE_VERSION: "22.x"

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build
        env:
          AI_PROVIDER: mock
          NEXT_PUBLIC_APP_URL: https://problems4us.azurewebsites.net
          NEXT_PUBLIC_APP_NAME: Problems4Us

      - name: Prepare standalone deployment package
        run: |
          cp -r .next/static .next/standalone/.next/static
          mkdir -p .next/standalone/public
          cp -r public/* .next/standalone/public/ 2>/dev/null || true
          cp web.config .next/standalone/web.config 2>/dev/null || true
          cd .next/standalone && zip -r ../../deploy.zip . && cd ../..

      - name: Login to Azure
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: az webapp deploy --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --src-path deploy.zip --type zip --async true
